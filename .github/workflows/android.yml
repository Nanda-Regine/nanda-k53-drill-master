name: Android build

# Builds the Capacitor Android app in the cloud — no local SDK needed.
#  - Debug APK: always built, downloadable from the run's Artifacts (sideload to test).
#  - Signed release AAB: built automatically once the ANDROID_KEYSTORE_BASE64
#    secret (+ passwords) are added in repo Settings → Secrets → Actions.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle (Capacitor mode)
        run: npm run build:app

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: k53-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # ── Signed release (only when a keystore secret is configured) ──────────────
      - name: Check for signing secrets
        id: signing
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS" ]; then echo "enabled=true" >> "$GITHUB_OUTPUT"; else echo "enabled=false" >> "$GITHUB_OUTPUT"; fi

      - name: Decode keystore
        if: steps.signing.outputs.enabled == 'true'
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KS" | base64 -d > android/release.keystore

      - name: Build signed release AAB
        if: steps.signing.outputs.enabled == 'true'
        working-directory: android
        env:
          STORE_PW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/release.keystore" \
            -Pandroid.injected.signing.store.password="$STORE_PW" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PW"

      - name: Upload signed release AAB
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: k53-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
